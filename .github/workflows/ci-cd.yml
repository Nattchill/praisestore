name: PraiseStore CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── BUILD & TEST ────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_sqlite, pdo_mysql, zip, gd, bcmath
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          APP_NAME=PraiseStore
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=true
          APP_URL=http://localhost

          DB_CONNECTION=sqlite
          DB_DATABASE=:memory:

          SESSION_DRIVER=array
          CACHE_STORE=array
          QUEUE_CONNECTION=sync

          MAIL_MAILER=array

          CLOUDINARY_URL=cloudinary://test:test@test
          CLOUDINARY_CLOUD_NAME=test
          CLOUDINARY_API_KEY=test
          CLOUDINARY_API_SECRET=test

          GOOGLE_CLIENT_ID=test
          GOOGLE_CLIENT_SECRET=test
          GOOGLE_REDIRECT_URI=http://localhost/auth/google/callback

          VITE_APP_NAME=PraiseStore
          EOF

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate application key
        run: php artisan key:generate

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Run PHPUnit tests
        run: php artisan test --parallel

  # ─── DOCKER BUILD ────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: praisestore:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── DEPLOY SUMMARY ──────────────────────────────────────────────
  deploy:
    name: Deploy Summary
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deployment summary
        run: |
          echo "🚀 PraiseStore build passed!"
          echo "📦 Commit: ${{ github.sha }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "🌐 Live: https://praisestore.onrender.com"
