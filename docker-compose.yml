version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: praisestore_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_NAME: PraiseStore
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: false
      APP_URL: http://localhost:8080
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: praisestore
      DB_USERNAME: praisestore
      DB_PASSWORD: secret
      SESSION_DRIVER: file
      CACHE_STORE: file
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    networks:
      - praisestore

  db:
    image: postgres:16-alpine
    container_name: praisestore_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: praisestore
      POSTGRES_USER: praisestore
      POSTGRES_PASSWORD: secret
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praisestore"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - praisestore

  phpmyadmin:
    image: dpage/pgadmin4:latest
    container_name: praisestore_pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@praisestore.rw
      PGADMIN_DEFAULT_PASSWORD: secret
    depends_on:
      - db
    networks:
      - praisestore

volumes:
  db_data:
  storage_data:

networks:
  praisestore:
    driver: bridge
