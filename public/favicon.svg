    <!-- Bag handle -->
    <path d="M12 6 C12 3 14 1 17 1 C20 1 22 3 22 6" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Bag body -->
    <rect x="5" y="8" width="24" height="20" rx="3" ry="3" fill="white"/>
    <!-- Store lines inside bag -->
    <rect x="10" y="14" width="14" height="2.5" rx="1.2" fill="url(#ig)"/>
    <rect x="10" y="19" width="10" height="2.5" rx="1.2" fill="url(#ig)"/>
  </g>
</svg>
